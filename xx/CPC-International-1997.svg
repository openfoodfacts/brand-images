<title>CPC International logo (1997)</title>
<desc> Logo of CPC International, an American corn-refining and consumer food products corporation in 1997. In 1998, the company was split into Bestfoods (later acquired by Unilever) and Corn Products International (now Ingredion Incorporated)</desc>
